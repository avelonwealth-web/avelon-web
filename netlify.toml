[build]
  command = "node netlify/scripts/inject-firebase-config.cjs"
  publish = "public"
  functions = "netlify/functions"

# Firebase Web API keys in client bundles are public by design, but the scanner
# flags the "AIza…" pattern. We inject at build from env instead (see inject script).
[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "public/js/firebase-init.js"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

# Compatibility alias: some providers use /functions/* instead of /.netlify/functions/*
[[redirects]]
  from = "/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[headers]]
  for = "/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#070b12" />
    <meta name="avelon-base" content="" />
    <title>AVELON — Referral Registration</title>
    <link rel="stylesheet" href="css/avelon.css" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="images/avelon.png" />
  </head>
  <body class="auth-page">
    <header class="app-header" style="position: relative">
      <div class="brand">
        <img src="images/avelon.png" alt="" />
        <div>AVELON</div>
      </div>
    </header>

    <main>
      <div class="card glass">
        <div class="row" style="margin-bottom: 10px">
          <div>
            <div class="h1">CREATE ACCOUNT</div>
            <div class="muted">Referral-Only Access</div>
          </div>
          <span class="badge">LOCKED</span>
        </div>
        <div class="neon-line"></div>
        <form id="reg-form">
          <div class="field">
            <label for="ref">Referral Code (REQUIRED)</label>
            <input id="ref" name="ref" inputmode="text" autocomplete="off" placeholder="CODE" required />
          </div>
          <div class="field">
            <label for="name">Username</label>
            <input id="name" name="name" autocomplete="name" minlength="2" maxlength="48" required />
          </div>
          <div class="field">
            <label for="mobile">Mobile Number</label>
            <input
              id="mobile"
              name="mobile"
              type="tel"
              inputmode="tel"
              autocomplete="tel"
              placeholder="09XXXXXXXXX"
              required
            />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <div class="field-password-inner">
              <input id="password" name="password" type="password" autocomplete="new-password" minlength="6" required />
              <button
                type="button"
                class="toggle-pw"
                data-password-toggle
                data-password-for="password"
                aria-label="Show password"
                aria-pressed="false"
              >
                <svg class="pw-eye-open" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="display: none">
                  <path
                    d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7Z"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linejoin="round"
                  />
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.7" />
                </svg>
                <svg class="pw-eye-shut" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="display: block">
                  <path
                    d="M3 3l18 18M10.5 10.5a3 3 0 0 0 4.2 4.2M9.5 5.2C10.7 4.7 11.8 4.5 13 4.5c6 0 10 7.5 10 7.5a18 18 0 0 1-2.4 3.2M6.3 6.3C4 8.3 2 12 2 12s4 7.5 10 7.5c1.2 0 2.4-.2 3.5-.6"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                  />
                </svg>
              </button>
            </div>
          </div>
          <div class="field">
            <label for="confirm-password">Confirm Password</label>
            <div class="field-password-inner">
              <input
                id="confirm-password"
                name="confirm-password"
                type="password"
                autocomplete="new-password"
                minlength="6"
                required
              />
              <button
                type="button"
                class="toggle-pw"
                data-password-toggle
                data-password-for="confirm-password"
                aria-label="Show password"
                aria-pressed="false"
              >
                <svg class="pw-eye-open" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="display: none">
                  <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" />
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.7" />
                </svg>
                <svg class="pw-eye-shut" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="display: block">
                  <path
                    d="M3 3l18 18M10.5 10.5a3 3 0 0 0 4.2 4.2M9.5 5.2C10.7 4.7 11.8 4.5 13 4.5c6 0 10 7.5 10 7.5a18 18 0 0 1-2.4 3.2M6.3 6.3C4 8.3 2 12 2 12s4 7.5 10 7.5c1.2 0 2.4-.2 3.5-.6"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                  />
                </svg>
              </button>
            </div>
          </div>
          <button class="btn" type="submit" style="width: 100%; margin-top: 8px">Create account</button>
        </form>
        <div style="margin-top: 12px" class="muted">
          Already Have An Account? -
          <a href="login.html" id="register-login-link">LOGIN HERE!</a>
        </div>
      </div>
    </main>

    <script src="js/avelon-path.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/avelon-fire.js"></script>
    <script src="js/avelon-phone-auth.js"></script>
    <script src="js/avelon-ui.js"></script>
    <script src="js/avelon-password-toggle.js"></script>
    <script src="js/register-page.js"></script>
  </body>
</html>

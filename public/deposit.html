<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#070b12" />
    <meta name="avelon-base" content="" />
    <title>AVELON — Deposit</title>
    <link rel="stylesheet" href="css/avelon.css" />
    <link rel="icon" href="images/avelon.png" />
  </head>
  <body>
    <header class="app-header" style="position: relative">
      <div class="brand">
        <img src="images/avelon.png" alt="" />
        <div>AVELON</div>
      </div>
    </header>

    <main>
      <div class="card glass">
        <div class="row">
          <div class="h1">Deposit</div>
          <button class="btn secondary" type="button" id="go-back">Back</button>
        </div>
        <div class="neon-line"></div>
        <div class="row">
          <div>
            <div class="muted">Wallet balance</div>
            <div class="h1 mono" id="dep-wallet-balance" style="font-size: 1.2rem">₱0.00</div>
          </div>
          <span class="badge">LIVE</span>
        </div>
        <p class="muted">Fund your wallet and post balance LIVE after payment confirmation.</p>
        <div class="field">
          <label for="dep-amount">Amount (PHP)</label>
          <input id="dep-amount" inputmode="decimal" placeholder="Enter amount" />
        </div>
        <button class="btn" type="button" id="dep-go-page" style="width: 100%">CONTINUE</button>
        <div class="neon-line"></div>
        <div class="muted" id="dep-out-page">Ready</div>
      </div>
    </main>

    <script src="js/avelon-path.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/avelon-fire.js"></script>
    <script src="js/avelon-ui.js"></script>
    <script>
      (function () {
        function toLogin() {
          window.location.href = window.avPath ? window.avPath("login.html") : "login.html";
        }
        function toDash() {
          var href = window.avPath ? window.avPath("dashboard.html") : "dashboard.html";
          try {
            if (window.history.length > 1) {
              window.history.back();
              return;
            }
          } catch (e) {}
          window.location.href = href;
        }
        document.addEventListener("DOMContentLoaded", function () {
          window.AvelonAuth.init();
          document.getElementById("go-back").onclick = toDash;
          var stopUserListen = null;
          window.AvelonAuth.onAuth(function (user) {
            if (!user) toLogin();
            if (stopUserListen) {
              try {
                stopUserListen();
              } catch (e) {}
              stopUserListen = null;
            }
            stopUserListen = window.AvelonDb.listenUser(user.uid, function (u) {
              var balEl = document.getElementById("dep-wallet-balance");
              if (balEl) balEl.textContent = window.AvelonUI.money(u && u.balance ? u.balance : 0);
            });
          });
          document.getElementById("dep-go-page").onclick = function () {
            var amount = Number(document.getElementById("dep-amount").value || "0");
            var out = document.getElementById("dep-out-page");
            if (!(amount >= 1)) {
              window.AvelonUI.toast("Minimum deposit is ₱1");
              return;
            }
            out.textContent = "Creating checkout…";
            window.AvelonApi
              .call("createCheckout", { amount: amount })
              .then(function (res) {
                try {
                  localStorage.setItem(
                    "avelon_pending_deposit",
                    JSON.stringify({
                      depositId: res && res.depositId ? String(res.depositId) : "",
                      startedAt: Date.now(),
                    })
                  );
                } catch (e) {}
                if (res.checkoutUrl) {
                  out.textContent = "Redirecting to Deposit Page…";
                  window.location.href = res.checkoutUrl;
                } else {
                  out.textContent = "Deposit Page created";
                }
              })
              .catch(function (e) {
                var msg = (e && e.message) || "Checkout unavailable";
                if (msg === "min_deposit_1") msg = "Minimum deposit is ₱1";
                out.textContent = msg;
              });
          };
        });
      })();
    </script>
  </body>
</html>

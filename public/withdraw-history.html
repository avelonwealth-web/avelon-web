<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#070b12" />
    <meta name="avelon-base" content="" />
    <title>AVELON — Withdrawal History</title>
    <link rel="stylesheet" href="css/avelon.css" />
    <link rel="icon" href="images/avelon.png" />
  </head>
  <body>
    <header class="app-header" style="position: relative">
      <div class="brand">
        <img src="images/avelon.png" alt="" />
        <div>AVELON</div>
      </div>
    </header>
    <main>
      <div class="card glass">
        <div class="row">
          <div class="h1">Withdrawal History</div>
          <button class="btn secondary" type="button" id="go-back">Back</button>
        </div>
        <div style="margin-top: 10px">
          <ul class="list" id="rows"></ul>
        </div>
      </div>
    </main>
    <script src="js/avelon-path.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/avelon-fire.js"></script>
    <script src="js/avelon-ui.js"></script>
    <script>
      (function () {
        function toLogin() {
          window.location.href = window.avPath ? window.avPath("login.html") : "login.html";
        }
        function toDash() {
          var href = window.avPath ? window.avPath("dashboard.html") : "dashboard.html";
          try {
            if (window.history.length > 1) {
              window.history.back();
              return;
            }
          } catch (e) {}
          window.location.href = href;
        }
        function render(rows) {
          var el = document.getElementById("rows");
          if (!rows.length) {
            el.innerHTML = '<li class="muted">No withdrawal records yet.</li>';
            return;
          }
          el.innerHTML = rows
            .map(function (w) {
              var ts = w.createdAt && w.createdAt.toDate ? w.createdAt.toDate().toLocaleString() : "";
              return (
                "<li><div class='row'><div style='font-weight:900'>" +
                (w.status || "pending") +
                "</div><div class='mono'>" +
                window.AvelonUI.money(w.amountGross || 0) +
                "</div></div><div class='muted' style='margin-top:6px'>Net: " +
                window.AvelonUI.money(w.amountNet || 0) +
                " · " +
                ts +
                "</div></li>"
              );
            })
            .join("");
        }
        document.addEventListener("DOMContentLoaded", function () {
          window.AvelonAuth.init();
          document.getElementById("go-back").onclick = toDash;
          window.AvelonAuth.onAuth(function (user) {
            if (!user) return toLogin();
            firebase
              .firestore()
              .collection("withdrawals")
              .where("userId", "==", user.uid)
              .orderBy("createdAt", "desc")
              .limit(100)
              .onSnapshot(function (q) {
                var rows = [];
                q.forEach(function (d) {
                  rows.push(Object.assign({ id: d.id }, d.data()));
                });
                render(rows);
              });
          });
        });
      })();
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#070b12" />
    <meta name="avelon-base" content="" />
    <title>AVELON — Logs</title>
    <link rel="stylesheet" href="css/avelon.css" />
    <link rel="icon" href="images/avelon.png" />
  </head>
  <body>
    <header class="app-header" style="position: relative">
      <div class="brand">
        <img src="images/avelon.png" alt="" />
        <div>AVELON</div>
      </div>
    </header>
    <main>
      <div class="card glass">
        <div class="row">
          <div class="h1">Logs</div>
          <button class="btn secondary" type="button" id="go-dashboard">Dashboard</button>
        </div>
        <div style="margin-top: 10px">
          <ul class="list" id="rows"></ul>
        </div>
      </div>
    </main>
    <script src="js/avelon-path.js"></script>
    <script src="js/firebase-init.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="js/avelon-fire.js"></script>
    <script src="js/avelon-ui.js"></script>
    <script>
      (function () {
        function toLogin() {
          window.location.href = window.avPath ? window.avPath("login.html") : "login.html";
        }
        function toDash() {
          window.location.href = window.avPath ? window.avPath("dashboard.html") : "dashboard.html";
        }
        function render(rows) {
          var el = document.getElementById("rows");
          if (!rows.length) {
            el.innerHTML = '<li class="muted">No logs yet.</li>';
            return;
          }
          el.innerHTML = rows
            .map(function (r) {
              var ts = r.timestamp && r.timestamp.toDate ? r.timestamp.toDate().toLocaleString() : "";
              return (
                "<li><div class='row'><div style='font-weight:900'>" +
                (r.level || "info").toUpperCase() +
                "</div><div class='mono'>" +
                ts +
                "</div></div><div class='muted' style='margin-top:6px'>" +
                (r.message || "") +
                "</div></li>"
              );
            })
            .join("");
        }
        document.addEventListener("DOMContentLoaded", function () {
          window.AvelonAuth.init();
          document.getElementById("go-dashboard").onclick = toDash;
          window.AvelonAuth.onAuth(function (user) {
            if (!user) return toLogin();
            window.AvelonDb.listenUserSub(user.uid, "logs", render, 200);
          });
        });
      })();
    </script>
  </body>
</html>

# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: avelon-api
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm install
    startCommand: npm run render:start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: PUBLIC_SITE_URL
        value: https://avelonwealth.site
      - key: PAYMONGO_WEBHOOK_SECRET
        sync: false
      # Optional: second signing secret while rotating webhooks in PayMongo Dashboard
      - key: PAYMONGO_WEBHOOK_SECRET_ALT
        sync: false
      - key: PAYMONGO_SECRET_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false